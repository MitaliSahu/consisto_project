<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consisto Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body data-theme="blue">

    <div class="global-controls">
        <button onclick="toggleTheme()" id="themeBtn">🌙 Deep Space</button>
    </div>

    <!-- HOME PAGE -->
    <section id="page-home" class="page active">
        <div class="hero">
            <img src="https://illustrations.popsy.co/white/abstract-art-4.svg" class="hero-img" alt="Consisto Art">
            <h1>CONSISTO</h1>
            <p style="opacity: 0.7; font-size: 1.2rem;">The Architect of Your Habits.</p>
            <button class="main-btn" onclick="showPage('page-login')" style="max-width: 200px;">Begin Journey</button>
        </div>
    </section>

    <!-- LOGIN PAGE -->
    <section id="page-login" class="page">
        <div class="auth-box">
            <img src="https://illustrations.popsy.co/white/key.svg" style="width: 80px; margin-bottom: 20px;" alt="Login">
            <h2 style="margin-top:0">Welcome Back</h2>
            <input type="text" id="username" placeholder="Username / Student ID">
            <input type="password" placeholder="Passcode">
            <button class="main-btn" onclick="handleAuth()">Access Dashboard</button>
        </div>
    </section>

    <!-- DASHBOARD -->
    <section id="page-dashboard" class="page">
        <div class="stats-card">
            <h2 style="margin-top:0">Focus Summary</h2>
            <p><span id="active-count" style="font-size: 2rem; font-weight: 900; color: var(--primary);">0</span> Ongoing Milestones</p>
        </div>
        
        <div style="display: flex; gap: 10px; width: 100%; max-width: 600px; margin-bottom: 20px;">
            <button class="main-btn" onclick="openModal()" style="flex: 2;">+ Create Objective</button>
            <button class="main-btn" onclick="showPage('page-todo')" style="flex: 1; background: var(--accent);">📝 To-Do List</button>
        </div>

        <div id="goals-container" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>

        <!-- UPDATED ARCHIVE SECTION -->
        <div class="archive-section">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); margin-bottom: 15px; padding-bottom: 10px;">
                <h3 style="margin:0;">Archive History</h3>
                <button class="delete-task-btn" onclick="clearFullArchive()" style="font-size: 11px; padding: 4px 8px;">Clear All</button>
            </div>
            <div id="archive-container" class="scroll-container"></div>
        </div>
    </section>

    <!-- TO-DO LIST PAGE -->
    <section id="page-todo" class="page">
        <div style="width:100%; max-width:600px; text-align:left;">
            <button class="back-btn" onclick="showPage('page-dashboard')" style="background:none; border:1px solid var(--border); padding:8px 15px; border-radius:8px; cursor:pointer; color:var(--text);">← Dashboard</button>
            <h1 style="margin: 20px 0;">To-Do List</h1>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="todoInput" placeholder="Enter a task..." style="margin:0;">
                <button class="main-btn" onclick="addTodo()" style="max-width: 80px; padding:0;">Add</button>
            </div>
            <div id="todo-list-container"></div>
        </div>
    </section>

    <!-- DETAIL PAGE -->
    <section id="page-detail" class="page">
        <div style="width:100%; max-width:850px; text-align:left;">
            <button class="back-btn" onclick="showPage('page-dashboard')" style="background:none; border:1px solid var(--border); padding:8px 15px; border-radius:8px; cursor:pointer; color:var(--text);">← Dashboard</button>
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
                <h1 id="detail-title">Goal</h1>
                <div style="display: flex; gap: 10px;">
                    <button class="main-btn" onclick="startNewCycle()" style="max-width: 130px; background: var(--accent); font-size: 14px;">New Cycle</button>
                    <button class="main-btn" onclick="archiveCurrentGoal()" style="max-width: 130px; background: #10b981; font-size: 14px;">Archive</button>
                </div>
            </div>
        </div>
        <div id="checkbox-container" class="checkbox-grid"></div>
    </section>

    <!-- MODAL -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Define Milestone</h3>
            <input type="text" id="goalTitle" placeholder="What are you mastering?">
            <select id="goalFreq">
                <option value="daily">Daily (Calendar Grid)</option>
                <option value="weekly">Weekly (Mon - Sun)</option>
                <option value="monthly">Monthly (Jan - Dec)</option>
                <option value="yearly">Yearly (10 Years)</option>
            </select>
            <button class="main-btn" onclick="addGoal()">Initialize</button>
            <button class="cancel-btn" onclick="closeModal()" style="background:none; border:none; color:var(--text); width:100%; margin-top:10px; cursor:pointer; opacity:0.6;">Discard</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
