<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consisto Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body data-theme="blue">

    <div class="global-controls">
        <button onclick="toggleTheme()" id="themeBtn">🌌 Deep Space</button>
    </div>

    <!-- LANDING & LOGIN -->
    <section id="page-home" class="page active">
        <div class="hero">
            <img src="https://illustrations.popsy.co/white/abstract-art-4.svg" class="hero-img" alt="Consisto Logo" style="width: 220px; margin-bottom: 20px;">
            <h1>CONSISTO</h1>
            <p style="opacity: 0.7;">The Architect of Your Habits.</p>
            <button class="main-btn" onclick="showPage('page-login')">Begin Journey</button>
        </div>
    </section>

    <section id="page-login" class="page">
        <div class="auth-box">
            <h2>Welcome Back</h2>
            <div style="display: flex; flex-direction: column; gap: 15px; width: 100%;">
                <input type="text" id="username" placeholder="Username / Student ID">
                <input type="password" id="passcode" placeholder="Passcode">
            </div>
            <button class="main-btn" onclick="handleAuth()" style="margin-top: 20px; width: 100%;">Access Dashboard</button>
        </div>
    </section>

    <!-- DASHBOARD -->
    <section id="page-dashboard" class="page">
        <div class="stats-card">
            <h2>Focus Summary</h2>
            <p><span id="active-count">0</span> Ongoing Milestones</p>
        </div>
        
        <div class="nav-hub" style="display: flex; gap: 10px; width: 100%; max-width: 600px; margin-bottom: 20px;">
            <button class="main-btn" onclick="openModal('task-modal')" style="flex: 2;">+ Create Objective</button>
            <button class="main-btn" onclick="showPage('page-todo')" style="flex: 1; background: var(--accent);">📝 To-Do</button>
            <button class="main-btn" onclick="showPage('page-notes')" style="flex: 1; background: #8b5cf6;">📓 Notes</button>
        </div>

        <div id="goals-container" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>

        <!-- RESTORED: Archive Section -->
        <details class="archive-section" style="width: 100%; max-width: 600px; margin-top: 20px;">
            <summary style="cursor: pointer; font-weight: 700; color: var(--primary); padding: 10px;">View Archive History</summary>
            <div id="archive-container" style="padding: 10px;"></div>
        </details>
    </section>

    <!-- RESTORED: To-Do List -->
    <section id="page-todo" class="page">
        <div style="width:100%; max-width:600px; text-align:left;">
            <button class="back-btn" onclick="showPage('page-dashboard')">← Dashboard</button>
            <h1 style="margin: 20px 0;">To-Do List</h1>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="todoInput" placeholder="Enter a task...">
                <button class="main-btn" onclick="addTodo()">Add</button>
            </div>
            <div id="todo-list-container"></div>
        </div>
    </section>

    <!-- NOTES & EDITOR (Retained) -->
    <section id="page-notes" class="page">
        <div style="width:100%; max-width:700px; text-align:left;">
            <button class="back-btn" onclick="showPage('page-dashboard')">← Dashboard</button>
            <h1>My Notes</h1>
            <button class="main-btn" onclick="openModal('new-note-modal')">+ Create New Note</button>
            <div id="notes-list-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;"></div>
        </div>
    </section>

    <section id="page-note-view" class="page">
        <div style="width:100%; max-width:800px; text-align:left;">
            <button class="back-btn" onclick="showPage('page-notes')">← All Notes</button>
            <input type="text" id="viewNoteTitle" class="note-title-input">
            <textarea id="viewNoteContent" class="note-textarea"></textarea>
            <button class="main-btn" onclick="saveNoteChanges()">Save Changes</button>
        </div>
    </section>

    <!-- GOAL DETAIL -->
    <section id="page-detail" class="page">
        <div style="width:100%; max-width:850px; text-align:left;">
            <button class="back-btn" onclick="showPage('page-dashboard')">← Dashboard</button>
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
                <h1 id="detail-title">Goal</h1>
                <div style="display: flex; gap: 10px;">
                    <button class="main-btn" onclick="openEditModal()" style="background: var(--accent);">Edit</button>
                    <button class="main-btn" onclick="archiveCurrentGoal()" style="background: #10b981;">Complete</button>
                </div>
            </div>
        </div>
        <div id="multi-cycle-container" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 40px;"></div>
    </section>

    <!-- MODALS -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <h3>New Objective</h3>
            <input type="text" id="goalTitle" placeholder="Title">
            <select id="goalFreq">
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
            </select>
            <button class="main-btn" onclick="addGoal()">Create</button>
            <button class="cancel-btn" onclick="closeModal('task-modal')">Cancel</button>
        </div>
    </div>

    <!-- RESTORED: Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>Edit Objective</h3>
            <input type="text" id="editGoalTitle">
            <select id="editGoalFreq">
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
            </select>
            <button class="main-btn" onclick="saveGoalEdit()">Save Changes</button>
            <button class="cancel-btn" onclick="closeModal('edit-modal')">Cancel</button>
        </div>
    </div>

    <div id="new-note-modal" class="modal">
        <div class="modal-content">
            <h3>New Note</h3>
            <input type="text" id="newNoteTitle" placeholder="Note Title">
            <button class="main-btn" onclick="createNewNote()">Create</button>
            <button class="cancel-btn" onclick="closeModal('new-note-modal')">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
