<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consisto Pro</title>
    
    <!-- Added Cache Busters (?v=2) to force immediate updates -->
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="manifest" href="manifest.json?v=2">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body data-theme="blue" data-mode="light">

    <!-- GLOBAL CONTROLS -->
    <div class="global-controls">
        <button onclick="toggleDarkMode()" id="darkModeBtn" title="Toggle Dark/Light">🌓</button>
        <button onclick="toggleTheme()" id="themeBtn" title="Switch Theme Color">🌌 Deep Space</button>
        <button id="installAppBtn" style="display:none;" class="pwa-btn">📲 Install</button>
        <!-- Logout button remains persistent via logic -->
        <button onclick="handleLogout()" id="logoutBtn" style="display:none;" class="logout-btn" title="Logout">🚪</button>
    </div>

    <!-- 1. LANDING PAGE -->
    <section id="page-home" class="page active">
        <div class="hero">
            <img src="https://illustrations.popsy.co/white/abstract-art-4.svg" class="hero-img" alt="Consisto Logo" style="width: 220px; margin-bottom: 20px;">
            <h1>CONSISTO</h1>
            <p style="opacity: 0.7;">The Architect of Your Habits.</p>
            <button class="main-btn" onclick="showPage('page-login')">Begin Journey</button>
        </div>
    </section>

    <!-- 2. LOGIN PAGE -->
    <section id="page-login" class="page">
        <div class="auth-box">
            <h2>Welcome Back</h2>
            <div style="display:flex; flex-direction:column; gap:15px; width:100%;">
                <input type="text" id="username" placeholder="Username / Student ID">
                <input type="password" id="passcode" placeholder="Passcode">
            </div>
            <button class="main-btn" onclick="handleAuth()" style="margin-top:20px; width:100%;">Access Dashboard</button>
        </div>
    </section>

    <!-- 3. DASHBOARD -->
    <section id="page-dashboard" class="page">
        <div class="stats-card">
            <h2>Focus Summary</h2>
            <p><span id="active-count">0</span> Ongoing Milestones</p>
        </div>
        
        <div class="nav-hub">
            <button class="main-btn" onclick="openModal('task-modal')" style="flex:2;">+ Create Objective</button>
            <button class="main-btn" onclick="showPage('page-todo')" style="flex:1; background:var(--accent);">📝 To-Do</button>
            <button class="main-btn" onclick="showPage('page-notes')" style="flex:1; background:#8b5cf6;">📓 Notes</button>
        </div>

        <!-- Active Objectives -->
        <details class="archive-section" open style="width:100%; max-width:600px;">
            <summary>Active Objectives</summary>
            <div id="goals-container" class="scroll-container"></div>
        </details>

        <!-- Archive History -->
        <details class="archive-section" style="width:100%; max-width:600px; margin-top:20px;">
            <summary>View Archive History</summary>
            <div style="padding:10px;">
                <button class="delete-task-btn" onclick="clearFullArchive()" style="width:100%; margin-bottom:10px;">Delete All History</button>
                <div id="archive-container" class="scroll-container"></div>
            </div>
        </details>
    </section>

    <!-- 4. TO-DO LIST -->
    <section id="page-todo" class="page">
        <div style="width:100%; max-width:600px;">
            <button class="back-btn" onclick="showPage('page-dashboard')">← Dashboard</button>
            <h1>To-Do List</h1>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <input type="text" id="todoInput" placeholder="Enter a task...">
                <button class="main-btn" onclick="addTodo()">Add</button>
            </div>
            <div id="todo-list-container"></div>
        </div>
    </section>

    <!-- 5. NOTES LIST -->
    <section id="page-notes" class="page">
        <div style="width:100%; max-width:700px;">
            <button class="back-btn" onclick="showPage('page-dashboard')">← Dashboard</button>
            <h1>My Notes</h1>
            <button class="main-btn" onclick="openModal('new-note-modal')">+ Create New Note</button>
            <div id="notes-list-container"></div>
        </div>
    </section>

    <!-- 6. NOTE EDITOR -->
    <section id="page-note-view" class="page">
        <div style="width:100%; max-width:800px;">
            <button class="back-btn" onclick="showPage('page-notes')">← All Notes</button>
            <input type="text" id="viewNoteTitle" class="note-title-input" placeholder="Title">
            <textarea id="viewNoteContent" class="note-textarea" placeholder="Start writing..."></textarea>
            <button class="main-btn" onclick="saveNoteChanges()">Save Changes</button>
        </div>
    </section>

    <!-- 7. GOAL DETAIL -->
    <section id="page-detail" class="page">
        <div style="width:100%; max-width:850px;">
            <button class="back-btn" onclick="showPage('page-dashboard')">← Dashboard</button>
            <div class="detail-header">
                <div>
                    <h1 id="detail-title">Goal</h1>
                    <!-- Visual Progress Bar -->
                    <div class="progress-bar-container">
                        <div id="detail-progress-fill" class="progress-fill"></div>
                    </div>
                    <small id="detail-percentage">0% Completed</small>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="main-btn" onclick="openEditModal()" style="background:var(--accent);">Edit</button>
                    <button class="main-btn" onclick="archiveCurrentGoal()" style="background:#10b981;">Complete</button>
                </div>
            </div>
        </div>
        <div id="multi-cycle-container" class="detail-grid-view"></div>
    </section>

    <!-- MODALS -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <h3>New Objective</h3>
            <input type="text" id="goalTitle" placeholder="Objective Title">
            <select id="goalFreq" onchange="toggleCustomFreqInput('goalFreq', 'customDaysContainer')">
                <option value="daily">Daily (31 Days)</option>
                <option value="weekly">Weekly (7 Days)</option>
                <option value="monthly">Monthly (12 Months)</option>
                <option value="yearly">Yearly (10 Years)</option>
                <option value="custom">Custom Range</option>
            </select>
            <div id="customDaysContainer" style="display:none;">
                <input type="number" id="customDays" placeholder="Number of days (e.g. 15)" min="1">
            </div>
            <button class="main-btn" onclick="addGoal()">Create</button>
            <button class="cancel-btn" onclick="closeModal('task-modal')">Cancel</button>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>Edit Objective</h3>
            <input type="text" id="editGoalTitle">
            <select id="editGoalFreq" onchange="toggleCustomFreqInput('editGoalFreq', 'editCustomDaysContainer')">
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
                <option value="custom">Custom</option>
            </select>
            <div id="editCustomDaysContainer" style="display:none;">
                <input type="number" id="editCustomDays" placeholder="Number of days" min="1">
            </div>
            <button class="main-btn" onclick="saveGoalEdit()">Save Changes</button>
            <button class="cancel-btn" onclick="closeModal('edit-modal')">Cancel</button>
        </div>
    </div>

    <div id="new-note-modal" class="modal">
        <div class="modal-content">
            <h3>New Note</h3>
            <input type="text" id="newNoteTitle" placeholder="Note Title">
            <button class="main-btn" onclick="createNewNote()">Create</button>
            <button class="cancel-btn" onclick="closeModal('new-note-modal')">Cancel</button>
        </div>
    </div>

    <!-- Added Cache Buster (?v=2) to script reference -->
    <script src="script.js?v=2"></script>
</body>
</html>
